# Optimized CI/CD Pipeline for Prompt Assistant
# Prevents server overload and includes proper resource management

name: Prompt Assistant CI/CD

on:
  push:
    branches: ["develop"]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".gitignore"
  pull_request:
    branches: ["develop"]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".gitignore"

# Cancel previous runs if new push occurs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: production
  CI: true
  FORCE_COLOR: 1

jobs:
  # Pre-checks to avoid unnecessary builds
  pre-check:
    name: Pre-build Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should-deploy: ${{ steps.check.outputs.should-deploy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if should deploy
        id: check
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/develop" ]] && [[ "${{ github.event_name }}" == "push" ]]; then
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should-deploy=false" >> $GITHUB_OUTPUT
          fi

  # Skip build on GitHub Actions and just do a validation check
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: pre-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install minimal dependencies
        run: |
          npm ci --prefer-offline --no-audit || npm install
          cd frontend && npm install --no-save typescript@5.3.3
          cd ../backend && npm install --no-save typescript@5.3.3

      - name: Verify setup
        run: |
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"
          cd frontend && echo "Frontend TypeScript version: $(npx tsc --version)"
          cd ../backend && echo "Backend TypeScript version: $(npx tsc --version)"

      - name: Create empty artifacts for deployment
        if: needs.pre-check.outputs.should-deploy == 'true'
        run: |
          # Create placeholder artifact folders
          mkdir -p frontend/.next/placeholder
          mkdir -p backend/dist/placeholder

          # Create placeholder files
          echo "This is a placeholder for build artifacts. Actual build will happen on deployment server." > frontend/.next/placeholder/README.txt
          echo "This is a placeholder for build artifacts. Actual build will happen on deployment server." > backend/dist/placeholder/README.txt

          echo "Created placeholder artifacts"

      - name: Upload placeholder artifacts
        if: needs.pre-check.outputs.should-deploy == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: code-artifacts
          path: |
            ./**
            !**/node_modules/**
          retention-days: 1

  # Safe deployment to self-hosted runner with build step
  deploy:
    name: Deploy to VPS
    runs-on: self-hosted
    timeout-minutes: 30
    needs: [pre-check, validate]
    if: needs.pre-check.outputs.should-deploy == 'true'

    environment:
      name: production
      url: https://prompt-assistant.dukang.online

    steps:
      - name: Cleanup workspace
        run: |
          # Safe cleanup to prevent disk space issues
          if [ -d "${{ github.workspace }}" ]; then
            rm -rf "${{ github.workspace }}"
          fi
          mkdir -p "${{ github.workspace }}"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download code artifacts
        uses: actions/download-artifact@v4
        with:
          name: code-artifacts
          path: ./

      - name: Run deployment setup
        run: |
          # Make setup script executable
          chmod +x scripts/deploy-setup.sh

          # Set CI mode environment variables
          export CI=true
          export CI_MODE=true
          export INTERACTIVE=false
          export DEBIAN_FRONTEND=noninteractive

          # Run deployment setup
          echo "🚀 Running deployment setup..."
          ./scripts/deploy-setup.sh

          echo "✅ Deployment completed successfully"
            
            # Basic checks to ensure minimum requirements
            echo "🔍 Checking minimum requirements..."
            
            # Check if PM2 is installed
            if ! command -v pm2 >/dev/null 2>&1; then
              echo "Installing PM2..."
              sudo npm install -g pm2 || npm install -g pm2
            fi
            
            # Check if Nginx is running
            if ! systemctl is-active --quiet nginx; then
              echo "Starting Nginx..."
              sudo systemctl start nginx || true
            fi
            
            # Ensure deploy directories exist
            sudo mkdir -p /home/deploy/apps/prompt_assistant /home/deploy/logs /home/deploy/backups
            sudo chown -R deploy:deploy /home/deploy 2>/dev/null || true
            
            echo "✅ Minimum requirements verified"
          }
        timeout-minutes: 12
        continue-on-error: true

      - name: Validate deployment environment
        run: |
          echo "🔍 Validating deployment environment..."

          # Check essential services
          echo "Checking essential services:"

          # Node.js version
          if command -v node >/dev/null 2>&1; then
            echo "✅ Node.js: $(node --version)"
          else
            echo "❌ Node.js not found"
            exit 1
          fi

          # PM2
          if command -v pm2 >/dev/null 2>&1; then
            echo "✅ PM2: $(pm2 --version)"
          else
            echo "❌ PM2 not found"
            exit 1
          fi

          # Nginx
          if command -v nginx >/dev/null 2>&1; then
            echo "✅ Nginx: $(nginx -v 2>&1)"
          else
            echo "❌ Nginx not found"
            exit 1
          fi

          # Check directories
          if [ -d "/home/deploy/apps/prompt_assistant" ]; then
            echo "✅ Deploy directory exists"
          else
            echo "❌ Deploy directory not found"
            sudo mkdir -p /home/deploy/apps/prompt_assistant
            sudo chown -R deploy:deploy /home/deploy
          fi

          # Check permissions
          if [ -w "/home/deploy/apps/prompt_assistant" ]; then
            echo "✅ Deploy directory is writable"
          else
            echo "⚠️  Deploy directory permissions issue, fixing..."
            sudo chown -R deploy:deploy /home/deploy
          fi

          echo "🎉 Environment validation completed"
        timeout-minutes: 3

      - name: Setup deployment environment
        run: |
          # Use a directory we have full control over
          export DEPLOY_DIR="$HOME/prompt_assistant_app"
          export BACKUP_DIR="$HOME/prompt_assistant_backup_$(date +%Y%m%d_%H%M%S)"

          # Create backup of current deployment if it exists
          if [ -d "$DEPLOY_DIR" ]; then
            cp -r "$DEPLOY_DIR" "$BACKUP_DIR"
          fi

          # Create fresh deployment directory
          rm -rf "$DEPLOY_DIR"
          mkdir -p "$DEPLOY_DIR"

          # Store paths for next steps
          echo "DEPLOY_DIR=$DEPLOY_DIR" >> $GITHUB_ENV
          echo "BACKUP_DIR=$BACKUP_DIR" >> $GITHUB_ENV

      - name: Create environment file
        run: |
          # Create .env file from GitHub Secrets (in writable temp directory)
          cat > "$DEPLOY_DIR/.env" << EOF
          # Application Settings
          NODE_ENV=production
          APP_NAME=Prompt Assistant

          # URLs
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          BACKEND_URL=${{ secrets.BACKEND_URL }}
          API_BASE_URL=${{ secrets.API_BASE_URL }}
          CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}

          # Database
          DATABASE_HOST=${{ secrets.DATABASE_HOST }}
          DATABASE_PORT=${{ secrets.DATABASE_PORT }}
          DATABASE_USERNAME=${{ secrets.DATABASE_USERNAME }}
          DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME=${{ secrets.DATABASE_NAME }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}

          # Redis
          REDIS_HOST=${{ secrets.REDIS_HOST }}
          REDIS_PORT=${{ secrets.REDIS_PORT }}
          REDIS_URL=${{ secrets.REDIS_URL }}

          # JWT
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=7d

          # Clerk
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
          CLERK_WEBHOOK_SECRET=${{ secrets.CLERK_WEBHOOK_SECRET }}

          # Clerk URLs
          NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in
          NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up
          NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=/chat
          NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=/chat

          # AI APIs
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}

          # File Upload
          MAX_FILE_SIZE=10485760
          UPLOAD_DIR=./uploads

          # Cloudinary
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_URL=${{ secrets.CLOUDINARY_URL }}

          # Ports
          FRONTEND_PORT=3000
          BACKEND_PORT=3001
          EOF

          # Set correct permissions (no ownership change needed in temp directory)
          chmod 600 "$DEPLOY_DIR/.env"

      - name: Stop services gracefully
        run: |
          # Stop PM2 processes gracefully
          pm2 stop prompt-assistant-frontend || true
          pm2 stop prompt-assistant-backend || true

          # Wait for processes to stop
          sleep 5

          # Force kill if still running
          pm2 delete prompt-assistant-frontend || true
          pm2 delete prompt-assistant-backend || true

      - name: Deploy application
        run: |
          # Copy new files to temp directory
          rsync -av --delete \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude '.env*' \
            "${{ github.workspace }}/" \
            "$DEPLOY_DIR/"
            
          # Make sure build artifacts exist in the correct location
          if [ ! -d "$DEPLOY_DIR/frontend/.next" ]; then
            echo "Warning: Frontend build artifacts not found at expected location"
            # Create directory structure
            mkdir -p "$DEPLOY_DIR/frontend/.next"
          fi

          if [ ! -d "$DEPLOY_DIR/backend/dist" ]; then
            echo "Warning: Backend build artifacts not found at expected location"
            # Create directory structure
            mkdir -p "$DEPLOY_DIR/backend/dist"
          fi
        timeout-minutes: 5

      - name: Cleanup any previous builds
        run: |
          echo "🧹 Cleaning up any previous build processes..."
          
          # Kill any existing node processes that might be stuck
          pkill -f "node.*build" || true
          pkill -f "npm.*build" || true
          pkill -f "next.*build" || true
          
          # Clean up any stuck lock files
          rm -f /tmp/.X*-lock || true
          rm -f $HOME/.npm/_locks/* || true
          
          # Clean up build logs
          rm -f /tmp/frontend-build.log || true
          
          echo "✅ Cleanup completed"
        timeout-minutes: 2

      - name: Install dependencies and build
        run: |
          cd "$DEPLOY_DIR"

          echo "🚀 Starting simplified build process..."
          
          # Install root dependencies quickly
          echo "📦 Installing root dependencies..."
          npm ci --prefer-offline --no-audit --silent
          
          # Frontend setup and build
          echo "🔧 Setting up frontend..."
          cd frontend
          
          # Quick dependency install
          rm -f package-lock.json
          npm install --no-audit --legacy-peer-deps --silent
          
          # Ensure critical packages
          npm install --save-dev typescript@5.3.3 tailwindcss@3.4.1 --silent
          
          echo "🔨 Building frontend (this may take several minutes)..."
          echo "⏰ Build started at: $(date)"
          
          # Build with reduced memory pressure
          export NODE_OPTIONS="--max-old-space-size=1536"
          export NEXT_TELEMETRY_DISABLED=1
          export CI=true
          
          # Run build with progress indicators
          npm run build 2>&1 | tee /tmp/frontend-build.log &
          BUILD_PID=$!
          
          # Monitor build progress
          while kill -0 $BUILD_PID 2>/dev/null; do
            echo "⏳ Build still running... $(date)"
            sleep 30
          done
          
          # Check if build succeeded
          wait $BUILD_PID
          BUILD_EXIT_CODE=$?
          
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "❌ Frontend build failed with exit code: $BUILD_EXIT_CODE"
            echo "� Last 20 lines of build log:"
            tail -20 /tmp/frontend-build.log
            exit 1
          fi
          
          echo "✅ Frontend build completed at: $(date)"
          
          # Backend build
          cd ../backend
          echo "🔧 Building backend..."
          npm install --no-audit --silent
          npm run build
          
          echo "🎉 All builds completed successfully!"
        timeout-minutes: 25

      - name: Database migration (if needed)
        run: |
          cd "$DEPLOY_DIR/backend"

          # Run migrations safely
          npm run migration:run || echo "Migration failed or not needed"
        timeout-minutes: 3

      - name: Start services
        run: |
          cd "$DEPLOY_DIR"

          # Start backend
          pm2 start ecosystem.config.js --only prompt-assistant-backend

          # Wait for backend to start
          sleep 10

          # Start frontend
          pm2 start ecosystem.frontend.config.js --only prompt-assistant-frontend

          # Save PM2 configuration
          pm2 save
        timeout-minutes: 5

      - name: Health check
        run: |
          # Wait for services to fully start
          sleep 30

          # Check backend health
          curl -f https://prompt-assistant.dukang.online/api/health || {
            echo "Backend health check failed"
            pm2 logs prompt-assistant-backend --lines 50
            exit 1
          }

          # Check frontend health
          curl -f https://prompt-assistant.dukang.online || {
            echo "Frontend health check failed"
            pm2 logs prompt-assistant-frontend --lines 50
            exit 1
          }

          echo "✅ Deployment successful!"
        timeout-minutes: 3

      - name: Cleanup old backups
        run: |
          # Keep only last 5 backups
          find /home/deploy/backups -maxdepth 1 -type d -name "20*" | \
            sort -r | tail -n +6 | xargs rm -rf

          # Clean up build artifacts
          rm -rf build-artifacts/
        timeout-minutes: 2

      - name: Rollback on failure
        if: failure()
        run: |
          echo "🚨 Deployment failed, initiating rollback..."

          # Stop failed deployment
          pm2 stop all || true
          pm2 delete all || true

          # Restore backup if exists
          if [ -d "$BACKUP_DIR/prompt_assistant" ]; then
            rm -rf "$DEPLOY_DIR"
            cp -r "$BACKUP_DIR/prompt_assistant" "$DEPLOY_DIR"
            
            # Restart from backup
            cd "$DEPLOY_DIR"
            pm2 start ecosystem.config.js
            pm2 start ecosystem.frontend.config.js
            pm2 save
            
            echo "✅ Rollback completed"
          else
            echo "❌ No backup found for rollback"
          fi

  # Notification job
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [validate, deploy]
    if: always() && needs.pre-check.outputs.should-deploy == 'true'
    timeout-minutes: 2

    steps:
      - name: Notify Success
        if: needs.deploy.result == 'success'
        run: |
          echo "🎉 Deployment successful!"
          echo "Frontend: https://prompt-assistant.dukang.online"
          echo "Backend: https://prompt-assistant.dukang.online/api"

      - name: Notify Failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "🚨 Deployment failed!"
          echo "Check logs and rollback was attempted."
